name: Code Quality & Security Scans

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black bandit safety

      - name: Black format check
        run: |
          black --check .

      - name: Ruff lint
        run: |
          ruff check .

      - name: Bandit security scan
        run: |
          bandit -r services -lll -x tests

      - name: Safety vulnerability check
        run: |
          if [ -f requirements.txt ]; then safety check --file=requirements.txt || true; fi

  snyk:
    if: secrets.SNYK_TOKEN != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions@master
        with:
          args: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
