name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run focused tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q tests/integration/test_e2e_flow.py

  full:
    name: Full CI (Postgres + Redis)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@127.0.0.1:5432/test_db
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Start CI services (Postgres, Redis)
        run: |
          docker compose -f docker-compose.ci.yml up -d

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 && break || sleep 1
          done

      - name: Install dependencies (full)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # faiss may not be available on all runners; attempt install but do not fail workflow if unavailable
          pip install faiss-cpu || echo "faiss install failed, continuing"

      - name: Install Alembic and run migrations
        run: |
          pip install alembic
          # Fail fast if migrations cannot be applied
          alembic -c alembic.ini upgrade head

      - name: Run namespaced tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q llm-hallucination-firewall/tests/unit || exit $?
          pytest -q tests/integration/test_e2e_flow.py || exit $?
          pytest -q tests/integration/test_rbac.py || exit $?
          pytest -q tests/integration/test_decision_persistence.py || exit $?
          # Run FAISS smoke; do not fail if FAISS not importable
          pytest -q tests/integration/test_faiss_smoke.py || echo "FAISS smoke skipped or failed"
          python - <<'PY'
import sys
try:
    import faiss
    print('faiss OK', faiss.__version__)
except Exception as e:
    print('faiss import failed:', e)
    # do not fail the job solely for missing faiss
    sys.exit(0)
PY
# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint
      
      - name: Lint with flake8
        run: |
          flake8 services/ db/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Format check with black
        run: black --check services/ db/
      
      - name: Import sort check
        run: isort --check-only services/ db/

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: llm_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: llm_firewall_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/gateway/requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=services/ --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://llm_user:password@localhost:5432/llm_firewall_test
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./infra/Dockerfile
          push: false
          tags: llm-hallucination-firewall:latest
          cache-from: type=registry,ref=llm-hallucination-firewall:buildcache
          cache-to: type=registry,ref=llm-hallucination-firewall:buildcache,mode=max
