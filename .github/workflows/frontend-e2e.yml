name: Frontend E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start infra
        run: |
          cd infra
          docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do curl -sSf http://localhost:8000/health && break || sleep 2; done

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright E2E
        run: |
          cd frontend
          npm run e2e

      - name: Tear down infra
        if: always()
        run: |
          cd infra
          docker compose down -v
