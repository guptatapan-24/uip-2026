[pytest]
# Limit test discovery to these directories to avoid cross-project collisions
testpaths =
    llm-hallucination-firewall/tests/unit
    tests

python_files = test_*.py
norecursedirs = frontend dashboard node_modules .git .venv
addopts = -q
pythonpath = .
; Set asyncio fixture loop scope to avoid pytest-asyncio deprecation warnings
asyncio_default_fixture_loop_scope = function
