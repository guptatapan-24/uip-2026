apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: llm-postgres
  labels:
    app: llm-postgres
spec:
  selector:
    matchLabels:
      app: llm-postgres
  serviceName: "llm-postgres"
  replicas: 1
  template:
    metadata:
      labels:
        app: llm-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: llm_firewall
            - name: POSTGRES_USER
              value: llm_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-firewall-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
