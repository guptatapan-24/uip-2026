apiVersion: v1
kind: Secret
metadata:
  name: llm-firewall-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://<DB_USER>:<DB_PASSWORD>@<HOST>:5432/<DB_NAME>"
  REDIS_URL: "redis://<REDIS_HOST>:6379/0"
  JWT_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----"
  JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\n...\n-----END PUBLIC KEY-----"
  OPENAI_API_KEY: ""
