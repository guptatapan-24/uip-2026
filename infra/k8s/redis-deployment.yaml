apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-redis
  labels:
    app: llm-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-redis
  template:
    metadata:
      labels:
        app: llm-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redisdata
              mountPath: /data
      volumes:
        - name: redisdata
          emptyDir: {}
