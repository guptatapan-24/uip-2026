apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-firewall-api
  labels:
    app: llm-firewall
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-firewall
  template:
    metadata:
      labels:
        app: llm-firewall
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/REPLACE_OWNER/llm-firewall:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: llm-firewall-config
            - secretRef:
                name: llm-firewall-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
